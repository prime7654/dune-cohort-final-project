{% extends "base.html" %}

{% block title %}Password Reset Sent | HappyMeal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-panel p-4 p-md-5 text-center">
            <p class="section-kicker mb-2">Check your email</p>
            <h1 class="display-6 fw-bold mb-3">Password Reset Sent</h1>
            <p class="text-muted mb-4">If an account exists for that email, a reset link has been sent.</p>
            <a class="btn btn-primary" href="{% url 'login' %}">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
